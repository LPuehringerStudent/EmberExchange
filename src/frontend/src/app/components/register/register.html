<div class="login-container">
  <!-- Animated Fire Background -->
  <div class="fire-bg">
    <div class="flame flame-1"></div>
    <div class="flame flame-2"></div>
    <div class="flame flame-3"></div>
    <div class="ember ember-1"></div>
    <div class="ember ember-2"></div>
    <div class="ember ember-3"></div>
    <div class="ember ember-4"></div>
  </div>

  <!-- Stove/Forge Register Card -->
  <div class="login-card">
    <!-- Header with Stove Icon -->
    <div class="login-header">
      <div class="stove-icon">
          <span><img
            style="image-rendering: pixelated; width: 64px; height: auto;"
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAACgCAYAAACLz2ctAAAABHNCSVQICAgIfAhkiAAAAL56VFh0UmF3IHByb2ZpbGUgdHlwZSBBUFAxAAAYlX1P0Q7CIAx85yv2CdcWCnwOMZtZYtTs/x8sAeZm1CNQetBez13n+7ytl+m5PZb1NrupggHns89cACQ0CEAMqtHOhh6F7GZFiD3nFjWnCH/4V3BCsB8qStF2K6hHbn38kBW2ZT0KvmmjDnnQ2CXkBx8++P7AKL564M6n4Xu0C5LU2ySkQVVZpTJClpPds+D/6iJNl9/+Altt6tzZN+11BvcCMLVWXKwegSQAAAMTSURBVHic7d3RThNRGIXRQRpLo4VClHhBfP/nMlyQaKTaxrYEg2+g2+SYXWGt65N2Br6ci/lzptMEAAAAAAAAAAAAAADA/+akfQGj3Nx8fGpfw+/c3n56Nn/rkV61L4CXTYBUCZAqAVIlQKoESJUAqRIgVQKkata+gD9JJxxXV6vo82azsbf8+PiYLo3u46VNTOyAVAmQKgFSJUCqBEiVAKkSIFUCpEqAVNWeuqcTjsViHn3e5eVltO70LJuYHLZfonWbzSZal9rtDtG65zIxsQNSJUCqBEiVAKkSIFUCpEqAVAmQKgFSdfRnQtIJx/39fbRuuczOcKRnPZbL5dDPS6WTpGOfmNgBqRIgVQKkSoBUCZAqAVIlQKoESJUAqTr6Scj67mu0Ln3cv5myMxyjz5jM9uts3eC3dx37xMQOSJUAqRIgVQKkSoBUCZAqAVIlQKoESNXwScjot16dLRbRut1uF607OWQ/rJ6eMQkHJrHRZ0eur99F67bbXfSHWa8/D52Y2AGpEiBVAqRKgFQJkCoBUiVAqgRIlQCpqp0JWYQTjjerD9G62Sz8XY/wTEh6ffv9PlqXGj3RSe+3xQ5IlQCpEiBVAqRKgFQJkCoBUiVAqgRIVW0Skj7xn6a7od+bTjjy6xsrnsAcfkTr0onJ9flFtG6apqFnR+yAVAmQKgFSJUCqBEiVAKkSIFUCpEqAVB3974SMnkikk4Fpnr0EKp5crLPJxW7K7vfh8DNa9/o8+xc/fB/7Vq6UHZAqAVIlQKoESJUAqRIgVQKkSoBUCZCq2iQkffI+n59G657CyUUqnZikZzNGf2/r80azA1IlQKoESJUAqRIgVQKkSoBUCZAqAVI1dnzwF1ar99Ej+ov526HfO3qyMnqikzqEZ0JS3w7baJ1fTOdZESBVAqRKgFQJkCoBUiVAqgRIlQCpqk1CUq2JyWjppKFl9IQjZQekSoBUCZAqAVIlQKoESJUAqRIgVQKk6ugnIal0YtLSmjQcOzsgVQKkSoBUCZAqAVIlQKoESJUAqRIgAAAAAAAA/BO/AFEamNLH6FzGAAAAAElFTkSuQmCC"
            alt="Coal Icon" /></span>
      </div>
      <h1>Create Account</h1>
      <p>Join the Ember Exchange</p>
    </div>

    <!-- Register Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="error-alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <!-- Username Field -->
      <div class="form-group">
        <label for="username">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Username
        </label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="blacksmith"
          [class.error]="errorMessage() && !username()"
        />
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Email
        </label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="blacksmith@forge.com"
          [class.error]="errorMessage() && !email()"
        />
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Password
        </label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [class.error]="errorMessage() && !password()"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          >
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="form-group">
        <label for="confirmPassword">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Confirm Password
        </label>
        <div class="password-input-wrapper">
          <input
            [type]="showConfirmPassword() ? 'text' : 'password'"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            [class.error]="errorMessage() && !confirmPassword()"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="toggleConfirmPassword()"
            [attr.aria-label]="showConfirmPassword() ? 'Hide password' : 'Show password'"
          >
            @if (showConfirmPassword()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-btn" [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="btn-spinner"></div>
          <span>Creating account...</span>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          <span>Create Account</span>
        }
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>or sign up with</span>
    </div>

    <!-- Social Login -->
    <div class="social-login">
      <button type="button" class="social-btn google">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <button type="button" class="social-btn github">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
      </button>
    </div>

    <!-- Login Link -->
    <div class="register-link">
      <span>Already have an account?</span>
      <a routerLink="/login">Sign in</a>
    </div>
  </div>

  <!-- Decorative Coal/Forge Elements -->
  <div class="forge-elements">
    <div class="coal coal-1"></div>
    <div class="coal coal-2"></div>
    <div class="coal coal-3"></div>
    <div class="spark spark-1"></div>
    <div class="spark spark-2"></div>
    <div class="spark spark-3"></div>
  </div>
</div>
