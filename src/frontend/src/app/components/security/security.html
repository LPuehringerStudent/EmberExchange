<!-- security.component.html -->
<div class="settings-section">
  <h1>Security</h1>
  <p class="subtitle">Manage your account security settings</p>

  <div class="security-list">
    <div class="security-card" (click)="toggleTwoFactor()">
      <div class="icon"></div>
      <div class="security-info">
        <span class="security-title">Two-Factor Authentication</span>
        <span class="security-desc">Add an extra layer of security</span>
      </div>
      <div class="toggle" [class.active]="twoFactorEnabled()">
        <div class="toggle-circle"></div>
      </div>
    </div>

    <div class="security-card" (click)="toggleLoginAlerts()">
      <div class="icon"></div>
      <div class="security-info">
        <span class="security-title">Login Alerts</span>
        <span class="security-desc">Get notified of new sign-ins</span>
      </div>
      <div class="toggle" [class.active]="loginAlerts()">
        <div class="toggle-circle"></div>
      </div>
    </div>

    <div class="security-card" (click)="toggleTrustedDevices()">
      <div class="icon"></div>
      <div class="security-info">
        <span class="security-title">Trusted Devices</span>
        <span class="security-desc">Skip 2FA on known devices</span>
      </div>
      <div class="toggle" [class.active]="trustedDevices()">
        <div class="toggle-circle"></div>
      </div>
    </div>
  </div>

  <div class="danger-zone">
    <h3>Danger Zone</h3>
    <button class="btn-danger">Delete Account</button>
  </div>
</div>
