<div id="app">
  <!-- Lootbox Counter -->
  <div class="lootbox-counter" style="
    text-align: center;
    margin-bottom: 20px;
    padding: 15px;
    background: linear-gradient(135deg, #2a2a3a, #1a1a2e);
    border-radius: 12px;
    border: 1px solid #ff8c42;
  ">
    <div style="font-size: 14px; color: #888; margin-bottom: 5px;">Available Lootboxes</div>
    <div style="font-size: 32px; font-weight: bold; color: #ff8c42;">{{ lootboxCount() }}</div>
  </div>

  <div id="lootbox-container">
    <img
      id="chest-image"
      [src]="isOpening ? 'assets/animation/chest-opening-transparent.gif' : 'assets/animation/chest-idle-animation.gif'"
      alt="Lootbox"
      (click)="!isOpening && openBox()"
      [style.opacity]="lootboxCount() > 0 ? '1' : '0.5'">
  </div>
  
  <button id="openBtn" (click)="openBox()" [disabled]="!canOpen()">
    @if (isOpening) {
      Opening...
    } @else if (lootboxCount() <= 0) {
      No Lootboxes
    } @else {
      Open ({{ lootboxCount() }} left)
    }
  </button>
  
  @if (lootboxCount() <= 0 && !isOpening) {
    <p style="text-align: center; color: #ff6b6b; margin-top: 10px;">
      You have no lootboxes. Visit the marketplace to buy more!
    </p>
  }
</div>

@if (showOverlay) {
  <div id="overlay" (click)="resetAll()">
    <div style="position: relative" (click)="$event.stopPropagation()">
      <div id="marker"></div>
      <div id="roller">
        <div id="items" #itemsContainer>
          @for (item of items; track item.name) {
            <div class="item" [style.background]="item.color">
              {{ item.name }}
            </div>
          }
        </div>
      </div>
    </div>
  </div>
}

@if (showPopup) {
  <div id="popup">
    <div id="popupBox">
      <h2 id="result">{{ resultText }}</h2>
      <button id="okBtn" (click)="resetAll()">Okay</button>
    </div>
  </div>
}
