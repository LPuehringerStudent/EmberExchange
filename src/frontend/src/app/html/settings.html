<!-- settings-component.html -->
<div class="settings-page">

  <div class="settings-wrapper">

    <!-- Left Navigation -->
    <aside class="settings-sidebar">
      <h2>Settings</h2>
      <ul>
        <li [class.active]="activeTab === 'account'" (click)="setActiveTab('account')">Account</li>
        <li [class.active]="activeTab === 'security'" (click)="setActiveTab('security')">Security</li>
        <li [class.active]="activeTab === 'appearance'" (click)="setActiveTab('appearance')">Appearance</li>
        <li [class.active]="activeTab === 'language'" (click)="setActiveTab('language')">Language</li>
        <li [class.active]="activeTab === 'socials'" (click)="setActiveTab('socials')">Socials</li>
      </ul>
    </aside>

    <!-- Right Content -->
    <main class="settings-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
