<div id="app">
  <div id="lootbox-container">
    <img 
      id="chest-image" 
      [src]="isOpening ? 'assets/animation/chest-opening-transparent.gif' : 'assets/animation/chest-idle-animation.gif'" 
      alt="Lootbox"
      (click)="!isOpening && openBox()">
  </div>
  <button id="openBtn" (click)="openBox()" [disabled]="isOpening">
    {{ isOpening ? 'Opening...' : 'Open' }}
  </button>
</div>

@if (showOverlay) {
  <div id="overlay" (click)="resetAll()">
    <div style="position: relative" (click)="$event.stopPropagation()">
      <div id="marker"></div>
      <div id="roller">
        <div id="items" #itemsContainer>
          @for (item of items; track item.name) {
            <div class="item" [style.background]="item.color">
              {{ item.name }}
            </div>
          }
        </div>
      </div>
    </div>
  </div>
}

@if (showPopup) {
  <div id="popup">
    <div id="popupBox">
      <h2 id="result">{{ resultText }}</h2>
      <button id="okBtn" (click)="resetAll()">Okay</button>
    </div>
  </div>
}
